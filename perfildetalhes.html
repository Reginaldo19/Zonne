<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Perfil · Zonne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpndyjvOk62csgt84AmGDzu3ShqnSHJ_M",
            authDomain: "sandnney-cb0c4.firebaseapp.com",
            databaseURL: "https://sandnney-cb0c4-default-rtdb.firebaseio.com",
            projectId: "sandnney-cb0c4",
            storageBucket: "sandnney-cb0c4.firebasestorage.app",
            messagingSenderId: "571535952362",
            appId: "1:571535952362:web:de395a9c216d9726078a93"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        window.db = database;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fc; }
        
        /* Profile cover com foto por trás e avatar por cima (sobreposição correta) */
        .profile-header {
            position: relative;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 0 0 32px 32px;
            overflow: visible;
        }
        .cover-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 0 0 32px 32px;
        }
        .avatar-wrapper {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .avatar-circle {
            width: 128px;
            height: 128px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .avatar-inner {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            overflow: hidden;
        }
        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #eef2f8;
        }
        .post-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.1);
        }
        .back-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .back-btn:hover {
            background: #f8fafc;
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .action-btn {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .action-btn-outline {
            background: white;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn-outline:hover {
            background: #eff6ff;
        }
        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 1000;
            max-width: 400px;
            margin: 0 auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<div class="max-w-4xl mx-auto px-4 py-6">
    <!-- Botão voltar -->
    <div class="mb-6">
        <button onclick="window.location.href='amigos.html'" class="back-btn flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Voltar para Amigos
        </button>
    </div>

    <!-- Perfil Container -->
    <div id="profileContent">
        <div class="loading-skeleton h-48 w-full rounded-2xl mb-8"></div>
        <div class="loading-skeleton h-32 w-32 rounded-full mx-auto mb-4"></div>
        <div class="loading-skeleton h-8 w-48 mx-auto mb-2"></div>
        <div class="loading-skeleton h-4 w-64 mx-auto mb-4"></div>
        <div class="loading-skeleton h-20 w-full rounded-xl mb-6"></div>
    </div>
</div>

<script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update, remove, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const auth = getAuth();
    const db = getDatabase();
    let currentUserId = null;
    let profileUserId = null;
    let profileData = null;
    let currentUserIsFriend = false;
    let pendingRequestSent = false;
    let pendingRequestReceived = false;

    const profileContent = document.getElementById("profileContent");

    function showToast(message, type = "info") {
        const existing = document.querySelector(".toast-message");
        if(existing) existing.remove();
        const toast = document.createElement("div");
        toast.className = "toast-message";
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Buscar posts usando query com orderByChild("uid") - corrigido com .indexOn
    async function loadUserPosts(uid) {
        try {
            const postsRef = ref(db, "posts");
            const postsQuery = query(postsRef, orderByChild("uid"), equalTo(uid));
            const postsSnap = await get(postsQuery);
            const posts = [];
            if(postsSnap.exists()) {
                postsSnap.forEach(child => {
                    posts.push({ id: child.key, ...child.val() });
                });
            }
            posts.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            window.userPosts = posts;
        } catch(e) { 
            console.error("Erro ao carregar posts:", e);
            // Fallback: buscar todos e filtrar localmente
            try {
                const allPostsSnap = await get(ref(db, "posts"));
                const posts = [];
                if(allPostsSnap.exists()) {
                    allPostsSnap.forEach(child => {
                        const post = child.val();
                        if(post.uid === uid) posts.push({ id: child.key, ...post });
                    });
                }
                posts.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
                window.userPosts = posts;
            } catch(err) { window.userPosts = []; }
        }
    }

    async function loadProfile(uid) {
        try {
            const userRef = ref(db, `users/${uid}`);
            const userSnap = await get(userRef);
            if(!userSnap.exists()) {
                profileContent.innerHTML = `<div class="text-center py-20 bg-white rounded-2xl"><i class="fas fa-user-slash text-5xl text-gray-300 mb-4"></i><p class="text-gray-500">Usuário não encontrado</p></div>`;
                return;
            }
            profileData = userSnap.val();
            profileData.uid = uid;

            if(currentUserId && currentUserId !== uid) {
                const friendRef = ref(db, `friends/${currentUserId}/${uid}`);
                const friendSnap = await get(friendRef);
                currentUserIsFriend = friendSnap.exists();

                const sentReqRef = ref(db, `friendRequests/${uid}/${currentUserId}`);
                const sentSnap = await get(sentReqRef);
                pendingRequestSent = sentSnap.exists() && sentSnap.val().status === "pending";

                const receivedReqRef = ref(db, `friendRequests/${currentUserId}/${uid}`);
                const receivedSnap = await get(receivedReqRef);
                pendingRequestReceived = receivedSnap.exists() && receivedSnap.val().status === "pending";
            }

            await loadUserPosts(uid);
            renderProfile();
        } catch(error) {
            console.error(error);
            profileContent.innerHTML = `<div class="text-center py-20"><p class="text-red-500">Erro ao carregar perfil</p></div>`;
        }
    }

    function renderProfile() {
        if(!profileData) return;
        
        const displayName = profileData.displayName || "Usuário";
        const email = profileData.email || "";
        const bio = profileData.bio || "Sem biografia ainda";
        const friendCount = profileData.friendCount || 0;
        const postCount = profileData.postCount || 0;
        const likeCount = profileData.likeCount || 0;
        const joinDate = profileData.createdAt ? new Date(profileData.createdAt).toLocaleDateString('pt-BR') : "Recentemente";
        const isOnline = profileData.isOnline || false;
        const avatarUrl = profileData.avatarUrl || null;
        const coverUrl = profileData.coverUrl || null;
        const avatarLetter = displayName.charAt(0).toUpperCase();

        let actionButtonHTML = "";
        if(currentUserId === profileData.uid) {
            actionButtonHTML = `<button onclick="window.location.href='socialsphere.html?view=profile'" class="action-btn-outline w-full"><i class="fas fa-edit mr-2"></i> Editar meu perfil</button>`;
        } else if(currentUserIsFriend) {
            actionButtonHTML = `
                <div class="flex gap-3">
                    <button onclick="sendMessage()" class="action-btn flex-1"><i class="fas fa-comment mr-2"></i> Enviar Mensagem</button>
                    <button onclick="removeFriendAction()" class="action-btn-outline flex-1"><i class="fas fa-user-minus mr-2"></i> Remover Amigo</button>
                </div>
            `;
        } else if(pendingRequestSent) {
            actionButtonHTML = `<button disabled class="action-btn-outline w-full opacity-50"><i class="fas fa-clock mr-2"></i> Solicitação enviada</button>`;
        } else if(pendingRequestReceived) {
            actionButtonHTML = `
                <div class="flex gap-3">
                    <button onclick="acceptFriendRequest()" class="action-btn flex-1"><i class="fas fa-check mr-2"></i> Aceitar</button>
                    <button onclick="rejectFriendRequest()" class="action-btn-outline flex-1"><i class="fas fa-times mr-2"></i> Recusar</button>
                </div>
            `;
        } else {
            actionButtonHTML = `<button onclick="sendFriendRequest()" class="action-btn w-full"><i class="fas fa-user-plus mr-2"></i> Adicionar Amigo</button>`;
        }

        profileContent.innerHTML = `
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <!-- Header com capa e avatar sobreposto -->
                <div class="profile-header">
                    ${coverUrl ? `<img src="${coverUrl}" class="cover-image" onerror="this.style.display='none'">` : '<div class="cover-image" style="background: linear-gradient(135deg, #3b82f6, #1e40af);"></div>'}
                    <div class="avatar-wrapper">
                        <div class="avatar-circle">
                            <div class="avatar-inner">
                                ${avatarUrl ? `<img src="${avatarUrl}" alt="Avatar">` : avatarLetter}
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Espaço para compensar o avatar sobreposto -->
                <div style="height: 70px;"></div>
                
                <!-- Informações -->
                <div class="text-center px-6 pb-6">
                    <h1 class="text-3xl font-bold text-gray-800 mt-2">${escapeHtml(displayName)}</h1>
                    <p class="text-gray-500 mt-1">${escapeHtml(email)}</p>
                    <div class="flex items-center justify-center gap-2 mt-2">
                        <span class="inline-flex items-center gap-1 text-sm ${isOnline ? 'text-green-600' : 'text-gray-400'}">
                            <i class="fas fa-circle text-xs"></i> ${isOnline ? 'Online' : 'Offline'}
                        </span>
                        <span class="text-gray-300">•</span>
                        <span class="text-sm text-gray-500"><i class="far fa-calendar-alt mr-1"></i> Membro desde ${joinDate}</span>
                    </div>
                    
                    <!-- Bio -->
                    <div class="bg-gray-50 rounded-xl p-4 mt-6 text-left">
                        <p class="text-gray-700">${escapeHtml(bio)}</p>
                    </div>
                    
                    <!-- Stats -->
                    <div class="grid grid-cols-3 gap-4 mt-8">
                        <div class="stat-card">
                            <div class="text-2xl font-bold text-blue-600">${postCount}</div>
                            <div class="text-sm text-gray-500 mt-1">Posts</div>
                        </div>
                        <div class="stat-card">
                            <div class="text-2xl font-bold text-blue-600">${friendCount}</div>
                            <div class="text-sm text-gray-500 mt-1">Amigos</div>
                        </div>
                        <div class="stat-card">
                            <div class="text-2xl font-bold text-blue-600">${likeCount}</div>
                            <div class="text-sm text-gray-500 mt-1">Curtidas</div>
                        </div>
                    </div>
                    
                    <!-- Ações -->
                    <div class="mt-8">
                        ${actionButtonHTML}
                    </div>
                </div>
            </div>
            
            <!-- Posts do usuário -->
            <div class="mt-8">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-newspaper text-blue-600"></i> Publicações
                </h2>
                <div id="userPostsContainer"></div>
            </div>
        `;

        const postsContainer = document.getElementById("userPostsContainer");
        if(window.userPosts && window.userPosts.length > 0) {
            postsContainer.innerHTML = "";
            window.userPosts.forEach(post => {
                const postDate = post.createdAt ? new Date(post.createdAt).toLocaleDateString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : "";
                const postText = post.text || "";
                const likesCount = post.likes ? Object.keys(post.likes).length : 0;
                
                const postCard = document.createElement("div");
                postCard.className = "post-card";
                postCard.innerHTML = `
                    <div class="flex items-start gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                            ${avatarLetter}
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-800">${escapeHtml(displayName)}</div>
                            <div class="text-xs text-gray-400">${postDate}</div>
                        </div>
                    </div>
                    <p class="text-gray-700 mb-3 whitespace-pre-wrap">${escapeHtml(postText)}</p>
                    ${post.media && post.media.length > 0 ? `
                        <div class="rounded-xl overflow-hidden mb-3">
                            ${post.media[0].type === 'photo' ? 
                                `<img src="${post.media[0].url}" class="w-full max-h-96 object-cover rounded-xl" loading="lazy" onerror="this.style.display='none'">` :
                                `<video src="${post.media[0].url}" controls class="w-full rounded-xl" onerror="this.style.display='none'"></video>`
                            }
                        </div>
                    ` : ''}
                    <div class="flex items-center gap-4 text-sm text-gray-500 pt-2 border-t border-gray-100">
                        <span><i class="far fa-heart mr-1"></i> ${likesCount} curtidas</span>
                        <span><i class="far fa-comment mr-1"></i> ${post.comments ? Object.keys(post.comments).length : 0} comentários</span>
                    </div>
                `;
                postsContainer.appendChild(postCard);
            });
        } else {
            postsContainer.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border border-gray-100"><i class="fas fa-newspaper text-4xl text-gray-300 mb-3"></i><p class="text-gray-500">Nenhuma publicação ainda</p></div>`;
        }
    }

    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    async function sendFriendRequest() {
        if(!currentUserId || !profileUserId) return;
        try {
            const reqRef = ref(db, `friendRequests/${profileUserId}/${currentUserId}`);
            await set(reqRef, {
                fromUid: currentUserId,
                fromName: auth.currentUser?.displayName || auth.currentUser?.email?.split('@')[0] || "Usuário",
                toUid: profileUserId,
                status: "pending",
                createdAt: Date.now()
            });
            await push(ref(db, `notifications/${profileUserId}`), {
                type: "friend_request",
                fromUid: currentUserId,
                fromName: auth.currentUser?.displayName || "Alguém",
                createdAt: Date.now(),
                read: false
            });
            showToast("Solicitação enviada!", "success");
            setTimeout(() => window.location.reload(), 1000);
        } catch(e) { showToast("Erro ao enviar solicitação", "error"); }
    }

    async function acceptFriendRequest() {
        if(!currentUserId || !profileUserId) return;
        try {
            await update(ref(db, `friendRequests/${currentUserId}/${profileUserId}`), { status: "accepted", acceptedAt: Date.now() });
            await set(ref(db, `friends/${currentUserId}/${profileUserId}`), { since: Date.now() });
            await set(ref(db, `friends/${profileUserId}/${currentUserId}`), { since: Date.now() });
            await push(ref(db, `notifications/${profileUserId}`), {
                type: "friend_accepted",
                fromUid: currentUserId,
                fromName: auth.currentUser?.displayName || "Usuário",
                createdAt: Date.now(),
                read: false
            });
            showToast("Amigo adicionado!", "success");
            setTimeout(() => window.location.reload(), 1000);
        } catch(e) { showToast("Erro ao aceitar", "error"); }
    }

    async function rejectFriendRequest() {
        if(!currentUserId || !profileUserId) return;
        try {
            await remove(ref(db, `friendRequests/${currentUserId}/${profileUserId}`));
            showToast("Solicitação recusada", "info");
            setTimeout(() => window.location.reload(), 1000);
        } catch(e) { showToast("Erro", "error"); }
    }

    async function removeFriendAction() {
        if(!confirm("Remover este amigo?")) return;
        try {
            await remove(ref(db, `friends/${currentUserId}/${profileUserId}`));
            await remove(ref(db, `friends/${profileUserId}/${currentUserId}`));
            showToast("Amigo removido", "success");
            setTimeout(() => window.location.reload(), 1000);
        } catch(e) { showToast("Erro", "error"); }
    }

    function sendMessage() {
        window.location.href = `socialsphere.html?chat=${profileUserId}`;
    }

    window.sendFriendRequest = sendFriendRequest;
    window.acceptFriendRequest = acceptFriendRequest;
    window.rejectFriendRequest = rejectFriendRequest;
    window.removeFriendAction = removeFriendAction;
    window.sendMessage = sendMessage;

    const urlParams = new URLSearchParams(window.location.search);
    const uidParam = urlParams.get("uid");

    if(!uidParam) {
        profileContent.innerHTML = `<div class="text-center py-20 bg-white rounded-2xl"><i class="fas fa-exclamation-triangle text-5xl text-yellow-500 mb-4"></i><p class="text-gray-600">Nenhum usuário especificado</p><button onclick="window.location.href='amigos.html'" class="mt-4 action-btn">Voltar</button></div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUserId = user.uid;
            if(uidParam) {
                profileUserId = uidParam;
                await loadProfile(profileUserId);
            }
        } else {
            profileContent.innerHTML = `<div class="text-center py-20 bg-white rounded-2xl"><p class="text-gray-600">Faça login para ver perfis</p><button onclick="window.location.href='socialsphere.html'" class="mt-4 action-btn">Ir para login</button></div>`;
        }
    });
</script>
</body>
</html>
