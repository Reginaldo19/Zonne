<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Zonne - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* ... (mesmo CSS anterior, adicionar apenas estilos novos) ... */
        
        /* MENSAGEM DE VISUALIZAÇÃO */
        .message .msg-status {
            font-size: 11px;
            margin-left: 4px;
        }
        .message .msg-status.read {
            color: #2ed573;
        }
        .message .msg-status.delivered {
            color: #f9ab00;
        }
        
        /* MENSAGEM DE CHAMADA */
        .message.call-message {
            max-width: 85%;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            text-align: center;
            background: #e8f0fe !important;
            color: #1a73e8 !important;
            border: 1px solid #d0e0ff !important;
            align-self: center;
        }
        .message.call-message.sent {
            background: #e8f0fe !important;
            color: #1a73e8 !important;
            border: 1px solid #d0e0ff !important;
        }
        .message.call-message.received {
            background: #e8f0fe !important;
            color: #1a73e8 !important;
            border: 1px solid #d0e0ff !important;
        }
        .message.call-message .msg-time {
            color: #5f6368 !important;
        }
        
        /* STICKER - TAMANHO FIXO */
        .message.sticker-msg {
            max-width: 130px !important;
            min-width: 80px;
            padding: 6px 8px !important;
            font-size: 60px !important;
            line-height: 1.1 !important;
            text-align: center !important;
            border-radius: 16px !important;
            background: transparent !important;
            border: none !important;
            animation: stickerBounce 0.5s ease;
        }
        .message.sticker-msg.sent {
            align-self: flex-end !important;
            background: transparent !important;
        }
        .message.sticker-msg.received {
            align-self: flex-start !important;
            background: transparent !important;
            border: none !important;
        }
        .message.sticker-msg .msg-time {
            font-size: 9px !important;
            opacity: 0.5 !important;
            margin-top: 2px !important;
        }
        
        /* STICKERS POPUP - TAMANHO FIXO */
        .stickers-popup .sticker-grid .sticker {
            font-size: 42px !important;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            background: #f8f9fa;
        }
        
        @keyframes stickerBounce {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); }
            70% { transform: scale(0.9) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e8f0fe;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* CALL OVERLAY */
        .call-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b1a2a;
            z-index: 2000;
            display: none;
            flex-direction: column;
            color: white;
        }
        .call-overlay.active { display: flex; }
        
        .call-videos {
            flex: 1;
            position: relative;
            background: #000;
        }
        .call-videos video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
            background: #333;
        }
        
        .call-info {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
        }
        .call-info .call-number {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .call-info .call-status {
            font-size: 18px;
            color: #4caf50;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .call-info .call-timer {
            font-size: 20px;
            font-family: monospace;
            margin-top: 5px;
            color: #ddd;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .call-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 2;
        }
        .call-controls .call-button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .call-controls .call-button.green { background: #25D366; color: white; }
        .call-controls .call-button.red { background: #f44336; color: white; }
        .call-controls .call-button.gray { background: #555; color: white; }
        .call-controls .call-button.active { background: #075e54; }
        .call-controls .call-label {
            text-align: center;
            color: #ddd;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* CALL INCOMING */
        .call-incoming {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .call-incoming.active { display: flex; }
        .call-incoming .incoming-avatar {
            width: 120px;
            height: 120px;
            background: #128C7E;
            border-radius: 50%;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        .call-incoming .incoming-number {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .call-incoming .incoming-type {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 50px;
        }
        .call-incoming .incoming-actions {
            display: flex;
            gap: 40px;
        }
        .call-incoming .incoming-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .call-incoming .incoming-btn.accept { background: #25D366; color: white; }
        .call-incoming .incoming-btn.decline { background: #f44336; color: white; }
        
        @media (max-width: 380px) {
            .message.sticker-msg { font-size: 48px !important; max-width: 100px !important; }
            .stickers-popup .sticker-grid .sticker { font-size: 32px !important; }
            #localVideo { width: 80px; height: 100px; }
            .message-input-area { margin-bottom: 50px; }
        }
    </style>
</head>

<script type="module">

import { getAuth, signOut, onAuthStateChanged } from 'firebase/auth';
import { 
    getDatabase, ref, set, push, onValue, update, get, 
    serverTimestamp, query, orderByChild, limitToLast, onChildAdded, remove

// ============================================
// CONFIGURAÇÃO FIREBASE

const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ============================================
// VARIÁVEIS

let currentUser = null;

const servers = {

        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }

// ============================================

// ============================================
// STICKERS - TAMANHO FIXO
// ============================================
if (stickerBtn) {
    stickerBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        stickersPopup.classList.toggle('active');
    });
}

document.addEventListener('click', () => {
    if (stickersPopup) stickersPopup.classList.remove('active');
});

document.querySelectorAll('.sticker').forEach(el => {
    el.addEventListener('click', function() {
        const emoji = this.textContent.trim();
        if (messageInput) {
            messageInput.value = emoji;
            // Envia automaticamente
            setTimeout(() => sendMessage(), 100);
        }
        if (stickersPopup) stickersPopup.classList.remove('active');
    });
});

// ============================================
// FUNÇÕES
// ============================================
async function loadUsers() {
    try {
        const snapshot = await get(ref(database, 'users'));
        if (snapshot.exists()) allUsers = snapshot.val();
    } catch (error) {
        console.error('Erro ao carregar usuários:', error);
    }
}

async function loadFriends() {
    if (!currentUser) return;
    try {
        const snapshot = await get(ref(database, `friends/${currentUser.uid}`));
        if (snapshot.exists()) friends = snapshot.val();
        else friends = {};
    } catch (error) {
        console.error('Erro ao carregar amigos:', error);
    }
}

function loadChats() {
    if (!currentUser || !chatList) return;
    
    onValue(ref(database, `chats/${currentUser.uid}`), (snapshot) => {
        const data = snapshot.val();
        chats = data || {};
        
        const count = Object.keys(chats).length;
        if (chatCount) chatCount.textContent = `${count} conversa${count !== 1 ? 's' : ''}`;
        if (chatBadge) chatBadge.textContent = count;
        
        if (count === 0) {
            chatList.innerHTML = `
                <div class="empty-chat">
                    <i class="fas fa-comment-dots"></i>
                    <h5>Nenhuma conversa</h5>
                    <p>Inicie uma conversa com seus amigos</p>
                    <button class="btn-start" id="startChatBtn"><i class="fas fa-plus"></i> Nova conversa</button>
                </div>
            `;
            const startBtn = document.getElementById('startChatBtn');
            if (startBtn && btnNewChat) {
                startBtn.addEventListener('click', () => btnNewChat.click());
            }
            return;
        }
        
        const sorted = Object.keys(chats).sort((a, b) => {
            return (chats[b]?.timestamp || 0) - (chats[a]?.timestamp || 0);
        });
        
        let html = '';
        sorted.forEach(uid => {
            const chat = chats[uid];
            const user = allUsers[uid];
            if (!user) return;
            
            const photo = user.photo ? `<img src="${user.photo}" alt="" />` : `<i class="fas fa-user"></i>`;
            const online = user.status === 'online';
            const lastMsg = chat?.lastMessage || 'Iniciar conversa';
            const time = chat?.timestamp ? 
                new Date(chat.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '';
            const unread = chat?.unread || 0;
            
            html += `
                <div class="chat-item" data-uid="${uid}">
                    <div class="chat-avatar">
                        ${photo}
                        <span class="online-dot ${online ? 'online' : 'offline'}"></span>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name" onclick="window.openProfile('${uid}')">
                            ${user.fullName || 'Usuário'}
                        </div>
                        <div class="chat-last">${lastMsg}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time">${time}</div>
                        ${unread > 0 ? `<div class="chat-unread">${unread}</div>` : ''}
                    </div>
                </div>
            `;
        });
        
        chatList.innerHTML = html;
        
        chatList.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', function() {
                const uid = this.dataset.uid;
                if (uid) openConversation(uid);
            });
        });
    });
}

// ============================================
// ABRIR PERFIL
// ============================================
window.openProfile = function(uid) {

// ============================================
// MARCAR MENSAGENS COMO LIDAS
// ============================================
async function markMessagesAsRead(uid) {
    if (!currentUser || !uid) return;
    
    try {
        const chatId = [currentUser.uid, uid].sort().join('_');
        const messagesRef = ref(database, `messages/${chatId}`);
        const snapshot = await get(messagesRef);
        if (!snapshot.exists()) return;
        
        const messages = snapshot.val();
        const updates = {};
        Object.keys(messages).forEach(key => {
            const msg = messages[key];
            if (msg.to === currentUser.uid && !msg.read) {
                updates[`${key}/read`] = true;
            }
        });
        
        if (Object.keys(updates).length > 0) {
            await update(messagesRef, updates);
        }
        
        // Atualizar contador de não lidas no chat
        await update(ref(database, `chats/${currentUser.uid}/${uid}`), { unread: 0 });
        
    } catch (error) {
        console.error('Erro ao marcar mensagens como lidas:', error);
    }
}

// ============================================
// CARREGAR MENSAGENS
// ============================================
function loadMessages(uid) {
    if (!currentUser || !uid) return;
    
    const chatId = [currentUser.uid, uid].sort().join('_');
    const messagesRef = ref(database, `messages/${chatId}`);
    const messagesQuery = query(messagesRef, orderByChild('timestamp'), limitToLast(50));
    
    if (messageListener) { messageListener(); messageListener = null; }
    if (messagesContainer) messagesContainer.innerHTML = '';
    
    messageListener = onChildAdded(messagesQuery, (snapshot) => {
        const msg = snapshot.val();
        const isSent = msg.from === currentUser.uid;
        const isSticker = msg.isSticker || false;
        const isCall = msg.isCall || false;
        const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '';
        
        const div = document.createElement('div');
        
        // Verifica se é mensagem de chamada
        if (isCall) {
            div.className = `message call-message ${isSent ? 'sent' : 'received'}`;
            const callIcon = msg.callType === 'video' ? '📹' : '📞';
            div.innerHTML = `
                ${callIcon} ${msg.text}
                <span class="msg-time">${time}</span>
            `;
        } else if (isSticker) {
            div.className = `message sticker-msg ${isSent ? 'sent' : 'received'}`;
            div.innerHTML = `
                ${msg.text}
                <span class="msg-time">${time}</span>
            `;
        } else {
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            let statusHtml = '';
            if (isSent) {
                if (msg.read) {
                    statusHtml = '<span class="msg-status read"><i class="fas fa-check-double"></i></span>';
                } else {
                    statusHtml = '<span class="msg-status delivered"><i class="fas fa-check"></i></span>';
                }
            }
            div.innerHTML = `
                ${msg.text}
                <span class="msg-time">${time} ${statusHtml}</span>
            `;
        }
        
        if (messagesContainer) {
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    });
}

// ============================================
// ENVIAR MENSAGEM
// ============================================
async function sendMessage() {
    const text = messageInput?.value?.trim();
    if (!text || !currentChatUser || !currentUser) return;
    
    const uid = currentChatUser.uid;
    const chatId = [currentUser.uid, uid].sort().join('_');
    
    // Verifica se é sticker (emoji único) - MAIS PRECISO
    const isSticker = /^[\u{1F600}-\u{1F9FF}\u{2764}\u{1F940}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]$/u.test(text) && text.length <= 2;
    
    if (sendBtn) {
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    }
    
    try {
        const newMsgRef = push(ref(database, `messages/${chatId}`));
        await set(newMsgRef, {
            from: currentUser.uid,
            to: uid,
            text: text,
            isSticker: isSticker,
            isCall: false,
            timestamp: serverTimestamp(),
            read: false
        });
        
        await set(ref(database, `chats/${currentUser.uid}/${uid}`), {
            lastMessage: text,
            timestamp: serverTimestamp(),
            unread: 0
        });
        await set(ref(database, `chats/${uid}/${currentUser.uid}`), {
            lastMessage: text,
            timestamp: serverTimestamp(),
            unread: 1
        });
        
        if (messageInput) messageInput.value = '';
        
    } catch (error) {
        console.error('Erro ao enviar:', error);
    }
    
    if (sendBtn) {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
    }
}

if (sendBtn) {
    sendBtn.addEventListener('click', sendMessage);
}

if (messageInput) {
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
}

// ENVIAR MENSAGEM DE CHAMADA
// ============================================
async function sendCallMessage(uid, callType, duration) {
    if (!currentUser || !uid) return;
    
    const chatId = [currentUser.uid, uid].sort().join('_');
    const text = duration > 0 ? 
        `Chamada de ${callType === 'video' ? 'vídeo' : 'voz'} - ${formatDuration(duration)}` :
        `Chamada de ${callType === 'video' ? 'vídeo' : 'voz'} - não atendida`;
    
    try {
        const newMsgRef = push(ref(database, `messages/${chatId}`));
        await set(newMsgRef, {
            from: currentUser.uid,
            to: uid,
            text: text,
            isSticker: false,
            isCall: true,
            callType: callType,
            callDuration: duration,
            timestamp: serverTimestamp(),
            read: false
        });
        
        await set(ref(database, `chats/${currentUser.uid}/${uid}`), {
            lastMessage: text,
            timestamp: serverTimestamp(),
            unread: 0
        });
        await set(ref(database, `chats/${uid}/${currentUser.uid}`), {
            lastMessage: text,
            timestamp: serverTimestamp(),
            unread: 1
        });
        
    } catch (error) {
        console.error('Erro ao enviar mensagem de chamada:', error);
    }
}

function formatDuration(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if (mins > 0) {
        return `${mins}min ${secs}s`;
    }
    return `${secs}s`;
}

// ============================================
// CHAMADA WEBRTC
// ============================================
async function startAudioCall() {
    if (!currentChatUser) {
        Swal.fire({ icon: 'warning', title: 'Atenção', text: 'Abra uma conversa para chamar' });
        return;
    }

    try {
        const destino = currentChatUser.uid;
        const callId = [currentUser.uid, destino].sort().join('_');
        currentCallId = callId;
        callAnswered = false;
        
        callNumber.textContent = currentChatUser.fullName || 'Usuário';
        callStatusText.textContent = 'Chamando...';
        callOverlay.classList.add('active');
        
        const constraints = { audio: true, video: false };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        localVideo.srcObject = localStream;
        
        peerConnection = new RTCPeerConnection(servers);
        
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            remoteStream = event.streams[0];
            remoteVideo.srcObject = remoteStream;
            callStatusText.textContent = 'Em chamada';
            callAnswered = true;
            startCallTimer();
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidatesRef = ref(database, `calls/${callId}/candidates`);
                push(candidatesRef, event.candidate.toJSON())
                    .catch(err => console.log('Erro ao salvar candidate:', err));
            }
        };

        peerConnection.oniceconnectionstatechange = () => {
            if (peerConnection.iceConnectionState === 'disconnected' || 
                peerConnection.iceConnectionState === 'failed' ||
                peerConnection.iceConnectionState === 'closed') {
                endCall();
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        await set(ref(database, `calls/${callId}`), {
            from: currentUser.uid,
            fromName: currentUserData?.fullName || 'Usuário',
            to: destino,
            offer: offer,
            type: 'audio',
            status: 'calling',
            timestamp: Date.now()
        });

        // Escuta answer
        const callRef = ref(database, `calls/${callId}`);
        onValue(callRef, async (snapshot) => {
            const data = snapshot.val();
            if (data && data.answer && peerConnection) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                } catch (err) {
                    console.log('Erro ao set remote description:', err);
                }
            }
            if (data && data.status === 'rejected') {
                endCall();
                Swal.fire({ icon: 'info', title: 'Chamada recusada', text: 'O usuário recusou a chamada', confirmButtonColor: '#1a73e8' });
            }
        });

        // Escuta candidatos
        const candidatesRef = ref(database, `calls/${callId}/candidates`);
        onValue(candidatesRef, (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnection) {
                Object.values(data).forEach(candidate => {
                    try {
                        peerConnection.addIceCandidate(new RTCIceCandidate(candidate))
                            .catch(err => console.log('Erro ao add candidate:', err));
                    } catch (e) {}
                });
            }
        });

        // Timeout se não atender em 30 segundos
        setTimeout(() => {
            if (!callAnswered && isCallActive) {
                endCall();
                Swal.fire({ icon: 'info', title: 'Chamada não atendida', text: 'O usuário não atendeu', confirmButtonColor: '#1a73e8' });
            }
        }, 30000);

    } catch (err) {
        console.error('Erro na chamada:', err);
        Swal.fire({ icon: 'error', title: 'Erro', text: err.message, confirmButtonColor: '#1a73e8' });
        endCall();
    }
}

async function receberChamada(data) {
    if (callIncoming.classList.contains('active')) return;
    
    const fromUser = allUsers[data.from];
    incomingNumber.textContent = fromUser?.fullName || data.from;
    incomingType.textContent = data.type === 'video' ? '📹 Videochamada' : '📞 Chamada de voz';
    callIncoming.classList.add('active');
    currentCallId = [currentUser.uid, data.from].sort().join('_');
}

async function aceitarChamada() {
    callIncoming.classList.remove('active');
    
    const snapshot = await get(ref(database, `calls/${currentCallId}`));
    const data = snapshot.val();
    if (!data) return;
    
    callNumber.textContent = data.fromName || 'Usuário';
    callStatusText.textContent = 'Conectando...';
    callOverlay.classList.add('active');

    try {
        const constraints = {
            audio: true,
            video: data.type === 'video'
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        localVideo.srcObject = localStream;
        
        peerConnection = new RTCPeerConnection(servers);
        
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            remoteStream = event.streams[0];
            remoteVideo.srcObject = remoteStream;
            callStatusText.textContent = 'Em chamada';
            callAnswered = true;
            startCallTimer();
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidatesRef = ref(database, `calls/${currentCallId}/candidates`);
                push(candidatesRef, event.candidate.toJSON())
                    .catch(err => console.log('Erro ao salvar candidate:', err));
            }
        };

        peerConnection.oniceconnectionstatechange = () => {
            if (peerConnection.iceConnectionState === 'disconnected' || 
                peerConnection.iceConnectionState === 'failed' ||
                peerConnection.iceConnectionState === 'closed') {
                endCall();
            }
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await update(ref(database, `calls/${currentCallId}`), {
            answer: answer,
            status: 'connected'
        });

        const candidatesRef = ref(database, `calls/${currentCallId}/candidates`);
        onValue(candidatesRef, (snapshot) => {
            const cands = snapshot.val();
            if (cands && peerConnection) {
                Object.values(cands).forEach(candidate => {
                    try {
                        peerConnection.addIceCandidate(new RTCIceCandidate(candidate))
                            .catch(err => console.log('Erro ao add candidate:', err));
                    } catch (e) {}
                });
            }
        });

    } catch (err) {
        console.error('Erro ao aceitar chamada:', err);
        Swal.fire({ icon: 'error', title: 'Erro', text: err.message, confirmButtonColor: '#1a73e8' });
        endCall();
    }
}

function startCallTimer() {
    callSeconds = 0;
    callStartTime = Date.now();
    if (callTimerInterval) clearInterval(callTimerInterval);
    
    callTimerInterval = setInterval(() => {
        if (callStatusText.textContent === 'Em chamada') {
            callSeconds = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(callSeconds / 60).toString().padStart(2, '0');
            const secs = (callSeconds % 60).toString().padStart(2, '0');
            callTimer.textContent = `${mins}:${secs}`;
        }
    }, 1000);
}

function endCall() {
    const duration = callSeconds;
    const callType = callStatusText.textContent === 'Em chamada' ? 
        (document.getElementById('localVideo').srcObject?.getVideoTracks().length > 0 ? 'video' : 'audio') : 
        'audio';
    const wasAnswered = callAnswered;
    
    // Encerrar recursos de áudio/vídeo
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    if (peerConnection) {
        peerConnection.close();
    }
    peerConnection = null;
    localStream = null;
    remoteStream = null;
    
    if (localVideo) localVideo.srcObject = null;
    if (remoteVideo) remoteVideo.srcObject = null;
    
    callOverlay.classList.remove('active');
    callIncoming.classList.remove('active');
    stopCallTimer();
    
    if (currentCallId) {
        remove(ref(database, `calls/${currentCallId}`))
            .catch(err => console.log('Erro ao remover call:', err));
        currentCallId = null;
    }
    
    isMuted = false;
    isSpeakerOn = false;
    btnMute.classList.remove('active');
    btnSpeaker.classList.remove('active');
    
    // Enviar mensagem de chamada no chat
    if (currentChatUser && wasAnswered) {
        sendCallMessage(currentChatUser.uid, callType, duration);
    } else if (currentChatUser && !wasAnswered && duration === 0) {
        sendCallMessage(currentChatUser.uid, callType, 0);
    }
    
    isCallActive = false;
    callAnswered = false;
}

function stopCallTimer() {
    if (callTimerInterval) {
        clearInterval(callTimerInterval);
        callTimerInterval = null;
    }
    callTimer.textContent = '00:00';
}

// Escutar chamadas recebidas
function listenIncomingCalls() {
    if (!currentUser) return;
    
    const callsRef = ref(database, 'calls');
    onValue(callsRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        
        Object.entries(data).forEach(([callId, call]) => {
            if (call && call.to === currentUser.uid && call.status === 'calling' && !callIncoming.classList.contains('active')) {
                receberChamada(call);
            }
        });
    });
}

            update(ref(database, `calls/${currentCallId}`), { status: 'rejected' });
            setTimeout(() => {
                remove(ref(database, `calls/${currentCallId}`));
            }, 1000);
            currentCallId = null;
        }
    });
}

if (btnMute) {
    btnMute.addEventListener('click', () => {
        if (localStream) {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted;
            });
            btnMute.classList.toggle('active');
            btnMute.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }
    });
}

if (btnSpeaker) {
    btnSpeaker.addEventListener('click', () => {
        isSpeakerOn = !isSpeakerOn;
        btnSpeaker.classList.toggle('active');
        btnSpeaker.innerHTML = isSpeakerOn ? '<i class="fas fa-volume-off"></i>' : '<i class="fas fa-volume-up"></i>';
    });
}

// ============================================
// NOVA CONVERSA - SÓ AMIGOS
// ============================================
if (btnNewChat) {
    btnNewChat.addEventListener('click', async () => {
        await loadUsers();
        await loadFriends();
        
        // Mostra SÓ os amigos (que estão na lista de amigos)
        const friendsList = Object.keys(friends).filter(uid => {
            if (uid === currentUser.uid) return false;
            return true;
        });
        
        if (friendsList.length === 0) {
            if (friendsListContainer) {
                friendsListContainer.innerHTML = `
                    <div class="empty-chat">
                        <i class="fas fa-user-friends"></i>
                        <h5>Nenhum amigo</h5>
                        <p>Adicione amigos para iniciar uma conversa</p>
                        <a href="amigos.html" class="btn btn-primary mt-3" style="background:#1a73e8;border:none;padding:10px 30px;border-radius:20px;color:white;text-decoration:none;">
                            <i class="fas fa-user-plus"></i> Ver amigos
                        </a>
                    </div>
                `;
            }
        } else {
            let html = '';
            friendsList.forEach(uid => {
                const user = allUsers[uid];
                if (!user) return;
                const hasChat = chats[uid] || false;
                html += `
                    <div class="friend-select-item" onclick="window.startNewChat('${uid}')">
                        <div class="fs-avatar">${user.photo ? `<img src="${user.photo}" alt="" />` : `<i class="fas fa-user"></i>`}</div>
                        <div class="fs-info">
                            <div class="fs-name">${user.fullName || 'Usuário'}</div>
                            <div class="fs-username">@${user.username || 'usuario'}</div>
                            <div class="fs-status ${user.status === 'online' ? 'online' : 'offline'}">${user.status === 'online' ? '🟢 Online' : '⚪ Offline'}</div>
                            ${hasChat ? '<div style="font-size:10px;color:#1a73e8;"><i class="fas fa-check"></i> Já tem conversa</div>' : ''}
                        </div>
                    </div>
                `;
            });
            if (friendsListContainer) friendsListContainer.innerHTML = html;
        }
        
        if (friendsListPage) {
            friendsListPage.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    });
}

window.startNewChat = function(uid) {
    if (chats[uid]) {
        friendsListPage.classList.remove('active');
        document.body.style.overflow = 'auto';
        openConversation(uid);
        return;
    }
    
    const chatId = [currentUser.uid, uid].sort().join('_');
    set(ref(database, `chats/${currentUser.uid}/${uid}`), {
        lastMessage: 'Início da conversa',
        timestamp: serverTimestamp(),
        unread: 0
    });
    set(ref(database, `chats/${uid}/${currentUser.uid}`), {
        lastMessage: 'Início da conversa',
        timestamp: serverTimestamp(),
        unread: 0
    });
    
    if (friendsListPage) friendsListPage.classList.remove('active');
    document.body.style.overflow = 'auto';
    openConversation(uid);
};

if (closeFriendsList) {
    closeFriendsList.addEventListener('click', () => {
        if (friendsListPage) friendsListPage.classList.remove('active');
        document.body.style.overflow = 'auto';
    });
}

// ============================================
// NOTIFICAÇÕES
// ============================================
if (btnNotifications) {
    btnNotifications.addEventListener('click', function() {
        const unreadCount = Object.keys(chats).filter(uid => chats[uid]?.unread > 0).length;
        Swal.fire({
            title: '🔔 Notificações',
            html: `<p>Você tem ${unreadCount} conversa${unreadCount !== 1 ? 's' : ''} com mensagens não lidas</p>`,
            confirmButtonColor: '#1a73e8'
        });
    });
}

if (convMore) {
    convMore.addEventListener('click', function() {
        if (!currentChatUser) return;
        Swal.fire({
            title: 'Opções',
            html: `
                <div style="text-align:left;">
                    <button onclick="window.openProfile('${currentChatUser.uid}')" style="width:100%;padding:10px;border:none;background:none;text-align:left;font-size:14px;cursor:pointer;border-bottom:1px solid #e8f0fe;">
                        <i class="fas fa-user" style="color:#1a73e8;"></i> Ver perfil
                    </button>
                    <button onclick="window.closeConversation()" style="width:100%;padding:10px;border:none;background:none;text-align:left;font-size:14px;cursor:pointer;color:#ea4335;">
                        <i class="fas fa-times"></i> Fechar conversa
                    </button>
                </div>
            `,
            confirmButtonText: 'Fechar',
            confirmButtonColor: '#5f6368'
        });
    });
}

// ============================================
// LOGOUT
// ============================================
if (btnLogout) {
    btnLogout.addEventListener('click', async () => {
        const result = await Swal.fire({
            title: 'Sair?',
            text: 'Tem certeza?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#ea4335',
            cancelButtonColor: '#5f6368',
            confirmButtonText: 'Sair',
            cancelButtonText: 'Cancelar'
        });
        
        if (result.isConfirmed) {
            try {
                await signOut(auth);
                window.location.reload();
            } catch (error) {
                console.error('Erro ao sair:', error);
            }
        }
    });
}

// ============================================
// AUTENTICAÇÃO
// ============================================
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        console.log('👤 Usuário logado:', user.email);
        
        try {
            const snapshot = await get(ref(database, `users/${user.uid}`));
            if (snapshot.exists()) {
                currentUserData = snapshot.val();
                
                if (currentUserData.photo && userAvatarMini) {
                    userAvatarMini.innerHTML = `<img src="${currentUserData.photo}" alt="Foto" />`;
                }
                
                await loadUsers();
                await loadFriends();
                loadChats();
                listenIncomingCalls();
            }
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
        }
    } else {
        console.log('👤 Nenhum usuário logado');
        window.location.href = 'social.html';
    }
});

// ============================================
// EXPOR FUNÇÕES
// ============================================
window.openConversation = openConversation;
window.closeConversation = closeConversation;
window.startNewChat = startNewChat;
window.openProfile = openProfile;
window.closeProfilePage = closeProfilePage;
window.startChatFromProfile = startChatFromProfile;

console.log('🚀 Zonne - Chat completo!');
console.log('✅ Sistema pronto!');
</script>
</body>
